@if (visible()) {
  <div class="intro" [class.intro--leaving]="leaving()" aria-hidden="true">

    <!-- Paneles de fondo que se abren como cortina al revelar -->
    <div class="intro__panels">
      @for (p of panels; track p) {
        <span class="intro__panel" [style.--i]="p"></span>
      }
    </div>

    <!-- Contenido central -->
    <div class="intro__content">

      <div class="intro__name" aria-label="Ayob El Kinani">
        @for (c of chars; track $index) {
          <span class="intro__char-mask">
            <span class="intro__char" [style.animation-delay.ms]="c.delay">{{ c.char }}</span>
          </span>
        }
      </div>

      <div class="intro__meta">
        <span class="intro__role">Desarrollador Web</span>
        <span class="intro__counter">{{ progress() }}<small>%</small></span>
      </div>

      <div class="intro__bar">
        <span class="intro__bar-fill" [style.width.%]="progress()"></span>
      </div>

    </div>
  </div>
}
