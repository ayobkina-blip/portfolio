@if (isOpen) {
  <div class="env-overlay" (click)="onBackdropClick($event)">

    <!-- Backdrop -->
    <div class="env-backdrop"></div>

    <!-- Close button -->
    <button class="env-close" (click)="close()" aria-label="Cerrar">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path stroke-linecap="round" stroke-linejoin="round" d="M6 18 18 6M6 6l12 12"/>
      </svg>
    </button>

    <!-- ── ENVELOPE SCENE ── -->
    @if (isEnvelopeVisible) {
      <div class="env-scene" [ngClass]="'is-' + state" (click)="openEnvelope()">

        <!-- Instruction label -->
        <div class="env-label" [class.env-label--pulse]="state === 'closed'">
          <span class="env-label__eyebrow">Curriculum Vitae</span>
          <span class="env-label__cta">
            <span class="env-label__dot"></span>
            Haz clic para abrir
          </span>
        </div>

        <div class="envelope">

          <!-- Ground shadow — outside clip so it isn't clipped -->
          <div class="envelope__shadow"></div>

          <!--
            CLIP WRAPPER
            overflow:hidden here prevents the inner letter from bleeding
            through the transparent corners of the flap SVG triangle.
            The flap is a SIBLING of this wrapper (not inside) so its
            rotateX transform is unaffected by the clip.
          -->
          <div class="envelope__clip">

            <!-- Back panel -->
            <div class="envelope__back"></div>

            <!-- Inner letter (hidden inside body until opening) -->
            <div class="envelope__letter">
              <div class="letter__header">
                <div class="letter__logo">AEK</div>
              </div>
              <div class="letter__lines">
                <div class="letter__line letter__line--long"></div>
                <div class="letter__line letter__line--mid"></div>
                <div class="letter__line letter__line--short"></div>
              </div>
            </div>

            <!-- Body — front lower half with seal -->
            <div class="envelope__body">
              <div class="envelope__corner envelope__corner--left"></div>
              <div class="envelope__corner envelope__corner--right"></div>
              <div class="envelope__content">
                <div class="envelope__lines-deco">
                  <span></span><span></span><span></span>
                </div>
                <div class="wax-seal">
                  <div class="wax-seal__ring"></div>
                  <div class="wax-seal__inner">
                    <svg viewBox="0 0 40 40" class="wax-seal__monogram">
                      <text x="50%" y="56%" dominant-baseline="middle" text-anchor="middle"
                            font-family="Cormorant Garamond, serif" font-weight="600"
                            font-size="16" fill="currentColor">AEK</text>
                    </svg>
                  </div>
                </div>
              </div>
            </div>

          </div><!-- /envelope__clip -->

          <!--
            FLAP — sibling of clip, NOT inside it.
            Needs to be outside to rotate freely with transform-origin: top center.
            z-index keeps it above the clip contents.
          -->
          <div class="envelope__flap">
            <svg viewBox="0 0 520 200" preserveAspectRatio="none" class="envelope__flap-svg">
              <defs>
                <linearGradient id="flapGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                  <stop offset="0%"   stop-color="#0d1530"/>
                  <stop offset="100%" stop-color="#1c2550"/>
                </linearGradient>
                <linearGradient id="flapSheen" x1="0%" y1="0%" x2="0%" y2="100%">
                  <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.07"/>
                  <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
                </linearGradient>
              </defs>
              <path d="M 0 0 L 520 0 L 260 185 Z" fill="url(#flapGrad)"/>
              <path d="M 0 0 L 520 0 L 260 185 Z" fill="url(#flapSheen)"/>
              <path d="M 0 0 L 260 185" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
              <path d="M 520 0 L 260 185" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
            </svg>
          </div>

        </div><!-- /envelope -->

        <!-- Dot pulse row -->
        <div class="env-dots">
          <span class="env-dot"></span>
          <span class="env-dot env-dot--mid"></span>
          <span class="env-dot"></span>
        </div>

      </div>
    }

    <!-- ── CV VIEWER ── -->
    @if (isCvVisible) {
      <div class="cv-viewer"
           [class.is-closing]="state === 'closing'"
           (click)="$event.stopPropagation()">

        <div class="cv-topbar">
          <div class="cv-topbar__left">
            <span class="cv-topbar__dot"></span>
            <span class="cv-topbar__dot cv-topbar__dot--mid"></span>
            <span class="cv-topbar__dot cv-topbar__dot--sm"></span>
            <span class="cv-topbar__name">Ayob El Kinani — Curriculum Vitae</span>
          </div>
          <a href="assets/CV.pdf" download="CV-Ayob-El-Kinani.pdf" class="cv-dl-btn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round"
                    d="M3 16.5v2.25A2.25 2.25 0 0 0 5.25 21h13.5A2.25 2.25 0 0 0 21 18.75V16.5M16.5 12 12 16.5m0 0L7.5 12m4.5 4.5V3"/>
            </svg>
            Descargar
          </a>
        </div>

        <iframe [src]="pdfUrl" class="cv-iframe" title="CV Ayob El Kinani"></iframe>

      </div>
    }

  </div>
}
