@if (isOpen) {
  <!-- Root: fixed fullscreen, position reference for all children -->
  <div class="fixed inset-0 z-50" (click)="onBackdropClick($event)">

    <!-- Backdrop -->
    <div class="absolute inset-0 bg-gray-950/85 backdrop-blur-md"
      [class.env-backdrop-out]="closing"
      style="animation: backdropIn 0.4s ease forwards;">
    </div>

    <!-- Close button (only when CV is visible) -->
    @if (cvVisible) {
      <button
        (click)="close()"
        class="absolute top-5 right-5 z-40 w-9 h-9 flex items-center justify-center rounded-full bg-white/10 hover:bg-white/20 text-white/70 hover:text-white transition-all duration-200">
        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" d="M6 18 18 6M6 6l12 12" />
        </svg>
      </button>
    }

    <!-- ENVELOPE: absolutely centered -->
    @if (envelopeVisible) {
      <div class="env-wrapper" [class.env-thrown]="thrown" (click)="throwEnvelope()">

        <p class="env-hint" [class.opacity-0]="thrown">
          Haz click para abrir
        </p>

        <div class="env-card" [class.env-hover]="!thrown">
          <!-- Flap -->
          <div class="env-flap">
            <svg viewBox="0 0 360 200" preserveAspectRatio="none" class="block w-full">
              <polygon points="0,0 360,0 180,170" fill="#c07a3a"/>
              <polygon points="2,0 358,0 180,165" fill="#d4905a"/>
              <line x1="0" y1="1" x2="360" y2="1" stroke="#a86830" stroke-width="1.5"/>
            </svg>
          </div>
          <!-- Body -->
          <div class="env-body">
            <div class="env-tri-left"></div>
            <div class="env-tri-right"></div>
            <div class="env-tri-bottom"></div>
            <div class="env-seal" [class.env-seal-break]="thrown">
              <span>AE</span>
            </div>
          </div>
        </div>

      </div>
    }

    <!-- CV PANEL: absolutely centered, independent of envelope -->
    @if (cvVisible) {
      <div class="cv-panel"
        [class.cv-panel-in]="cvIn"
        [class.cv-panel-out]="cvOut"
        (click)="$event.stopPropagation()">

        <!-- Top bar -->
        <div class="flex items-center justify-between px-5 py-3 bg-white border-b border-gray-100 flex-shrink-0">
          <div class="flex items-center gap-2.5">
            <div class="w-1.5 h-1.5 rounded-full bg-indigo-500"></div>
            <span class="text-xs font-semibold text-gray-500 uppercase tracking-widest">CV — Ayob El Kinani</span>
          </div>
          <a href="assets/CV_pdf.pdf" download="CV-Ayob-El-Kinani.pdf"
            class="flex items-center gap-1.5 text-xs font-semibold text-indigo-600 hover:text-indigo-700 px-3 py-1.5 rounded-lg hover:bg-indigo-50 transition-colors">
            <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 0 0 5.25 21h13.5A2.25 2.25 0 0 0 21 18.75V16.5M16.5 12 12 16.5m0 0L7.5 12m4.5 4.5V3" />
            </svg>
            Descargar
          </a>
        </div>

        <iframe [src]="pdfUrl" class="cv-iframe border-0 block w-full flex-1"></iframe>

      </div>
    }

  </div>
}
