  <!-- Vercel Analytics: pega aquí el snippet que provee Vercel (Dashboard → Analytics) -->
  <!-- Ejemplo: <script defer src="https://static.vercel-insights.com/script.js" data-...></script> -->
  <script id="vercel-analytics-placeholder"></script>
  <script>
    // Se ejecuta antes de pintar para evitar parpadeos (FOUC).
    (function () {
      try {
        // 1) Aplica el tema guardado antes del primer render (evita flash claro).
        var theme = localStorage.getItem('theme');
        var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        if (theme === 'dark' || (theme === 'auto' && prefersDark)) {
          document.documentElement.classList.add('dark');
        }

        // 2) Decide si la intro de entrada debe reproducirse: solo en la
        // primera visita de la sesión y respetando prefers-reduced-motion.
        var seen = sessionStorage.getItem('introSeen');
        var reducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
        if (!seen && !reducedMotion) {
          document.documentElement.classList.add('is-loading');
        }
      } catch (e) { /* noop */ }
    })();
  </script>
