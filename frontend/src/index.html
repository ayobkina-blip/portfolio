<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Ayob El Kinani - Web Developer</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <!-- Vercel Analytics: pega aquí el snippet que provee Vercel (Dashboard → Analytics) -->
  <!-- Ejemplo: <script defer src="https://static.vercel-insights.com/script.js" data-...></script> -->
  <script id="vercel-analytics-placeholder"></script>
  <script>
    // Decide si la intro de entrada debe reproducirse antes de pintar,
    // para evitar un flash del hero. Solo en la primera visita de la
    // sesión y respetando prefers-reduced-motion.
    (function () {
      try {
        var seen = sessionStorage.getItem('introSeen');
        var reduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
        if (!seen && !reduced) {
          document.documentElement.classList.add('is-loading');
        }
      } catch (e) { /* noop */ }
    })();
  </script>
</head>
<body>
  <app-root></app-root>
</body>
</html>
