<div class="text-center px-4 py-16 animate-fade-in">

    <div class="text-center">
      <h1 class="text-5xl md:text-6xl font-bold text-gray-900 dark:text-gray-100 mb-4">
        Ayob El Kinani

      <div class="relative inline-block mb-8">
        <h2 class="text-2xl md:text-3xl text-indigo-600 dark:text-indigo-400 font-medium">

      <p class="text-lg text-gray-600 dark:text-gray-300 mb-8 max-w-2xl mx-auto">
        Construyendo soluciones digitales con pasión y creatividad
      </p>
      
      <!-- Call to Action Buttons -->
      <div class="flex flex-col sm:flex-row gap-4 justify-center mb-8">
        <button

        >
          Ver proyectos
        </button>
        <button 
          (click)="scrollToSection('contact')" 
          class="bg-transparent border-2 border-indigo-600 text-indigo-600 hover:bg-gradient-to-r hover:from-indigo-600 hover:to-violet-600 hover:text-white px-8 py-3 rounded-lg font-semibold transition-all duration-300 transform hover:scale-105"
        >
