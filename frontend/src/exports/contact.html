<div class="px-4 py-16">
  <div class="max-w-2xl mx-auto">
    <div class="flex items-center justify-center mb-12">
      <!-- Envelope icon -->
      <svg class="w-8 h-8 text-indigo-600 dark:text-indigo-400 mr-3" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 4.26a2 2 0 001.78.52l7.14 7.79a2 2 0 002.52.78L21 8M3 8l7.89 4.26M3 8l0 8m0-8l7.89 4.26M21 8l-7.89 4.26M21 8l0 8" />
      </svg>
      <h2 class="text-3xl font-bold text-gray-900 dark:text-gray-100">Contacto</h2>
    </div>
    
    @if (submitted) {
      <div class="bg-green-900 border border-green-700 text-green-300 px-6 py-4 rounded-lg text-center">
        <div class="text-green-400 text-lg font-medium mb-2">✓ Mensaje enviado correctamente</div>
        <p class="text-green-300">Me pondré en contacto contigo lo antes posible.</p>
      </div>
    } @else {
      <form (ngSubmit)="onSubmit()" class="space-y-6">
        <!-- Name Field -->
        <div>
          <label for="nombre" class="block text-sm font-medium text-gray-300 mb-2">Nombre</label>
          <input 
            type="text" 
            id="nombre" 
            name="nombre" 
            [(ngModel)]="formData.nombre" 
            required
            class="w-full px-4 py-3 bg-gray-800 border border-gray-700 rounded-lg text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-600 focus:border-transparent transition-colors"
            placeholder="Tu nombre"
          />
        </div>
        
        <!-- Email Field -->
        <div>
          <label for="email" class="block text-sm font-medium text-gray-300 mb-2">Email</label>
          <input 
            type="email" 
            id="email" 
            name="email" 
            [(ngModel)]="formData.email" 
            required
            class="w-full px-4 py-3 bg-gray-800 border border-gray-700 rounded-lg text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-600 focus:border-transparent transition-colors"
            placeholder="tu@email.com"
          />
        </div>
        
        <!-- Message Field -->
        <div>
          <label for="mensaje" class="block text-sm font-medium text-gray-300 mb-2">Mensaje</label>
          <textarea 
            id="mensaje" 
            name="mensaje" 
            [(ngModel)]="formData.mensaje" 
            required
            rows="5"
            class="w-full px-4 py-3 bg-gray-800 border border-gray-700 rounded-lg text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-600 focus:border-transparent transition-colors resize-none"
            placeholder="Tu mensaje..."
          ></textarea>
        </div>
        
        <!-- Error Message -->
        @if (error) {
          <div class="bg-red-900 border border-red-700 text-red-300 px-4 py-3 rounded-lg">
            {{ error }}
          </div>
        }
        
        <!-- Submit Button -->
        <div>
          @if (loading) {
            <button 
              type="button" 
              disabled
              class="w-full bg-blue-600 hover:bg-blue-700 text-white py-3 px-6 rounded-lg font-medium transition-colors disabled:opacity-50 disabled:cursor-not-allowed"
            >
              <span class="flex items-center justify-center">
                <svg class="animate-spin -ml-1 mr-3 h-5 w-5" fill="currentColor" viewBox="0 0 20 20">
                  <path fill-rule="evenodd" d="M4 2a1 1 0 00-1 1v2.5a1 1 0 002 2h12a1 1 0 002-2V3a1 1 0 00-2-2H6a1 1 0 00-1 1v2.5a1 1 0 002 2h12a1 1 0 002-2V3a1 1 0 00-2-2H6z"/>
                </svg>
                Enviando...
              </span>
            </button>
          } @else {
            <button 
              type="submit" 
              class="w-full bg-blue-600 hover:bg-blue-700 text-white py-3 px-6 rounded-lg font-medium transition-colors"
            >
              Enviar mensaje
            </button>
          }
        </div>
      </form>
    }
  </div>
</div>
