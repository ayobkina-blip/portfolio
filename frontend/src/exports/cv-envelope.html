@if (isOpen) {
  <!-- Backdrop -->
  <div
    class="fixed inset-0 z-50 flex items-center justify-center p-4"
    [class.backdrop-enter]="isOpen">

    <!-- Background -->
    <div
      class="absolute inset-0 bg-gray-950/80 backdrop-blur-sm"
      (click)="close()">
    </div>

    <!-- Envelope container -->
    <div class="relative z-10 flex flex-col items-center" [class.envelope-opened]="opened">

      <!-- Close button -->
      <button
        (click)="close()"
        class="absolute -top-12 right-0 w-9 h-9 flex items-center justify-center rounded-full bg-white/10 hover:bg-white/20 text-white transition-colors">
        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" d="M6 18 18 6M6 6l12 12" />
        </svg>
      </button>

      <!-- CV Panel (slides up from envelope) -->
      <div class="cv-panel bg-white rounded-t-xl overflow-hidden shadow-2xl">
        <div class="flex items-center justify-between px-4 py-2 bg-gray-50 border-b border-gray-100">
          <span class="text-xs font-semibold text-gray-500 uppercase tracking-widest">CV — Ayob El Kinani</span>
          <a
            href="/assets/CV_pdf.pdf"
            download="CV-Ayob-El-Kinani.pdf"
            class="flex items-center gap-1.5 text-xs font-semibold text-indigo-600 hover:text-indigo-700 transition-colors">
            <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 0 0 5.25 21h13.5A2.25 2.25 0 0 0 21 18.75V16.5M16.5 12 12 16.5m0 0L7.5 12m4.5 4.5V3" />
            </svg>
            Descargar
          </a>
        </div>
        <iframe
          src="/assets/CV_pdf.pdf"
          class="cv-iframe block border-0">
        </iframe>
      </div>

      <!-- Envelope body -->
      <div class="envelope-body" (click)="openEnvelope()">

        <!-- Flap top (clickable before opening) -->
        <div class="envelope-flap">
          <div class="flap-inner">
            <!-- Triangle flap shape -->
            <svg viewBox="0 0 320 160" class="w-full" preserveAspectRatio="none">
              <polygon points="0,0 320,0 160,140" fill="#e8e8f0" stroke="#d1d5db" stroke-width="1"/>
            </svg>
          </div>
          <!-- Click hint (only before opening) -->
          @if (!opened) {
            <div class="flap-hint">
              <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" d="M15.042 21.672 13.684 16.6m0 0-2.51 2.225.569-9.47 5.227 7.917-3.286-.672Zm-7.518-.267A8.25 8.25 0 1 1 20.25 10.5M8.288 14.212A5.25 5.25 0 1 1 17.25 10.5" />
              </svg>
              <span>Abrir</span>
            </div>
          }
        </div>

        <!-- Envelope base -->
        <div class="envelope-base">
          <!-- Left fold -->
          <div class="fold-left"></div>
          <!-- Right fold -->
          <div class="fold-right"></div>
          <!-- Bottom fold -->
          <div class="fold-bottom"></div>
          <!-- Wax seal -->
          @if (!opened) {
            <div class="wax-seal">
              <span class="text-white font-bold text-sm">AE</span>
            </div>
          }
        </div>

      </div>

    </div>

  </div>
}
